name: Sync KwikAds Dashboard from Salesforce

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install simple-salesforce

      - name: Run sync script
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
        run: python sync_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "kwikads-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-sync dashboard from Salesforce"
          git push
